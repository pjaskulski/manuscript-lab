{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<p class="muted">Słownik: {{ scope_label }}</p>
<form method="post" class="card">
    {{ form.hidden_tag() }}
    <div>{{ form.name.label }} {{ form.name() }}</div>
    <div class="actions">
        {{ form.submit(class_="btn btn-primary") }}
        <a class="btn" href="{{ cancel_url }}">Anuluj</a>
    </div>
</form>
{% endblock %}
