server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    client_max_body_size 20m;

    location = /manuscriptlab {
        return 301 /manuscriptlab/$is_args$args;
    }

    location /manuscriptlab/static/ {
        alias /srv/manuscript-lab/app/static/;
        access_log off;
        expires 7d;
    }

    location /manuscriptlab/scans/uploads/ {
        alias /srv/manuscript-lab/instance/uploads/scans/;
        access_log off;
        expires 7d;
    }

    location /manuscriptlab/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /manuscriptlab;
        proxy_read_timeout 60s;
    }
}
